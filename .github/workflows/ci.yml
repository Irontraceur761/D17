name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:api
      - run: npm run test:contracts
      - run: npm run test:guard -w @d17/web
      - run: npm run build:abi -w @d17/contracts
      - run: npm run check:explorer -w @d17/contracts
      - run: npm run release:protocol
      - run: npm run check:release
      - run: git diff --exit-code -- contracts/abi release/protocol-build.json release/solc-input.json
